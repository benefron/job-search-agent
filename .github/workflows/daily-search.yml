name: Weekly Job Search

on:
  schedule:
    # Monday 04:00 UTC = 05:00 CET / 06:00 CEST
    - cron: "0 4 * * 1"
  workflow_dispatch:          # allow manual trigger from Actions tab

permissions:
  contents: write             # needed to commit data/ and push gh-pages

jobs:
  scrape-and-score:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ──
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # ── 2. Python + deps ──
      # Note: jobs.db is committed to git (no cache needed — git IS the persistence layer)
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Create data/ dir in case cache miss ──
      - name: Ensure data/ dir
        run: mkdir -p data

      # ── 4b. Restore private candidate profile (kept out of the public repo) ──
      - name: Restore private profile
        env:
          PROFILE_PRIVATE_B64: ${{ secrets.PROFILE_PRIVATE_B64 }}
        run: |
          if [ -n "$PROFILE_PRIVATE_B64" ]; then
            echo "$PROFILE_PRIVATE_B64" | base64 -d > scraper/profile_private.py
            echo "Private profile restored."
          else
            echo "PROFILE_PRIVATE_B64 not set — scoring will use the template profile."
          fi

      # ── 5. Run pipeline ──
      - name: Run job search pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python -m scraper.main

      # ── 7. Commit updated JSON exports to main branch ──
      - name: Commit data exports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Commit the DB so it is never lost even when the cache misses.
          # NOTE: only add tracked files — a nonexistent/ignored pathspec makes
          # git add fail fatally and silently skip the commit.
          git add data/jobs.json data/stats.json data/jobs_export.csv data/jobs.db
          git diff --cached --quiet || git commit -m "chore: daily job search update [skip ci]"
          # Pull any commits pushed to main since checkout (e.g. mid-run hotfixes),
          # then push. Retry once in case of a race condition.
          git pull --rebase origin main || true
          git push || (git pull --rebase origin main && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 8. Bundle dashboard + data into a single deploy directory ──
      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy/data
          cp dashboard/index.html _deploy/index.html
          # Copy JSON exports so dashboard can fetch data/jobs.json relative to root
          cp data/jobs.json  _deploy/data/jobs.json  2>/dev/null || echo '{}' > _deploy/data/jobs.json
          cp data/stats.json _deploy/data/stats.json 2>/dev/null || echo '{}' > _deploy/data/stats.json
          cp data/labs.json  _deploy/data/labs.json  2>/dev/null || echo '{"labs":[]}' > _deploy/data/labs.json

      # ── 9. Deploy to GitHub Pages ──
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
          publish_branch: gh-pages
          keep_files: false
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "deploy: dashboard update [skip ci]"

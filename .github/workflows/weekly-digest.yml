name: Weekly Job Digest

on:
  schedule:
    # Fridays 07:00 UTC = 08:00 CET / 09:00 CEST
    - cron: "0 7 * * 5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure data/ dir
        run: mkdir -p data

      - name: Restore private profile
        env:
          PROFILE_PRIVATE_B64: ${{ secrets.PROFILE_PRIVATE_B64 }}
        run: |
          if [ -n "$PROFILE_PRIVATE_B64" ]; then
            echo "$PROFILE_PRIVATE_B64" | base64 -d > scraper/profile_private.py
            echo "Private profile restored."
          else
            echo "PROFILE_PRIVATE_B64 not set — scoring will use the template profile."
          fi

      - name: Run weekly digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python -m scraper.main --weekly-digest

      - name: Commit updated exports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json data/stats.json data/jobs_export.csv data/jobs.db
          git diff --cached --quiet || git commit -m "chore: weekly digest update [skip ci]"
          git pull --rebase origin main || true
          git push || (git pull --rebase origin main && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy/data
          cp dashboard/index.html _deploy/index.html
          cp data/jobs.json  _deploy/data/jobs.json  2>/dev/null || echo '{}' > _deploy/data/jobs.json
          cp data/stats.json _deploy/data/stats.json 2>/dev/null || echo '{}' > _deploy/data/stats.json
          cp data/labs.json  _deploy/data/labs.json  2>/dev/null || echo '{"labs":[]}' > _deploy/data/labs.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
          publish_branch: gh-pages
          keep_files: false
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "deploy: weekly digest update [skip ci]"
